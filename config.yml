# SOC-Forge configuration (Phase 3)

input:
  timezone: "UTC"

output:
  alerts_json: "out/alerts.json"
  report_html: "out/report.html"

detections:
  brute_force:
    threshold: 8
    window_minutes: 10
    severity: "high"
    score: 60

  account_lockout:
    severity: "medium"
    score: 40

  new_admin:
    severity: "high"
    score: 90

  new_service_installed:
    severity: "high"
    score: 80
    score_boost: 20
    suspicious_markers:
      - "\\Users\\"
      - "\\AppData\\"
      - "\\Temp\\"
      - "\\ProgramData\\"
      - "powershell.exe"
      - "cmd.exe"
      - "rundll32.exe"
      - "mshta.exe"
      - "wscript.exe"

  scheduled_task_created:
    severity: "high"
    score: 75
    score_boost: 20
    suspicious_markers:
      - "powershell"
      - " -enc "
      - "cmd.exe"
      - "rundll32"
      - "mshta"
      - "wscript"
      
  suspicious_rdp_logon:
    severity: "medium"
    score: 55
    logon_type: 10

correlation:
  window_minutes: 15
  rules:
    bruteforce_lockout:
      enabled: true
      severity: "critical"
      score: 120

    rdp_schtask:
      enabled: true
      severity: "high"
      score: 110

    rdp_new_admin:
      enabled: true
      severity: "critical"
      score: 130